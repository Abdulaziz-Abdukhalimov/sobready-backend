# Server port (your React app currently calls localhost:3004, we'll use 8080)
server.port=8080

# Database connection (connecting to your "sobready" PostgreSQL database)
spring.datasource.url=jdbc:postgresql://localhost:5432/sobready
spring.datasource.username=abdukhalimov_front_end
spring.datasource.password=

# JPA / Hibernate settings
# "update" = auto-create/update tables based on your Java entities (like auto-migration)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File upload settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Secret (used to sign auth tokens)
app.jwt.secret=sobready-secret-key-change-this-in-production-make-it-long-enough
app.jwt.expiration=86400000
